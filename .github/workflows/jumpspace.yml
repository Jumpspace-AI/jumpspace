# BEGIN JUMPSPACE MANAGED: github-ci
name: Jumpspace PR Assistant

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  jumpspace:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build package
        run: npm run build

      - name: Build Jumpspace PR comment
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set +e
          JUMPSPACE_BIN=(node dist/cli.js)

          "${JUMPSPACE_BIN[@]}" task scan
          SCAN_EXIT=$?
          "${JUMPSPACE_BIN[@]}" task semantic build --json > jumpspace-semantic-build.json
          SEMANTIC_EXIT=$?
          "${JUMPSPACE_BIN[@]}" task pr comment --since "$BASE_SHA" > jumpspace-pr-comment.md
          COMMENT_EXIT=$?
          "${JUMPSPACE_BIN[@]}" task audit --json > jumpspace-audit.json
          AUDIT_EXIT=$?
          "${JUMPSPACE_BIN[@]}" task doctor --json > jumpspace-doctor.json
          DOCTOR_EXIT=$?

          node <<'NODE'
          const fs = require("fs");
          const marker = "<!-- jumpspace-pr-assistant:v1 -->";
          const footer = "\n\n---\n\nOutput truncated to stay within GitHub limits. Run jumpspace task pr comment --since <base-sha> locally for the full packet.\n";
          const source = fs.readFileSync("jumpspace-pr-comment.md", "utf8");

          function bounded(value, maxChars) {
            if (value.length <= maxChars) {
              return value;
            }
            const budget = Math.max(0, maxChars - footer.length);
            return value.slice(0, budget).replace(/\s+$/u, "") + footer;
          }

          let comment = bounded(source, 60000);
          if (!comment.includes(marker)) {
            comment = marker + "\n" + comment;
          }
          fs.writeFileSync("jumpspace-pr-comment-bounded.md", comment);
          fs.writeFileSync("jumpspace-pr-summary.md", bounded(source, 60000));
          NODE

          {
            printf "scan=%s\n" "$SCAN_EXIT"
            printf "semantic=%s\n" "$SEMANTIC_EXIT"
            printf "comment=%s\n" "$COMMENT_EXIT"
            printf "audit=%s\n" "$AUDIT_EXIT"
            printf "doctor=%s\n" "$DOCTOR_EXIT"
          } > jumpspace-exit-codes.txt
          exit 0

      - name: Add Jumpspace summary
        run: cat jumpspace-pr-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert Jumpspace PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- jumpspace-pr-assistant:v1 -->";
            const body = fs.readFileSync("jumpspace-pr-comment-bounded.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail if Jumpspace checks failed
        run: |
          while IFS='=' read -r check code; do
            if [ "$code" != "0" ]; then
              echo "::error title=Jumpspace check failed::$check exited with $code"
              exit "$code"
            fi
          done < jumpspace-exit-codes.txt
# END JUMPSPACE MANAGED: github-ci
