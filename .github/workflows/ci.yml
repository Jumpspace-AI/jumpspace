name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install package dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run package tests
        run: npm test

      - name: Run Python SDK contract tests
        run: python -m unittest discover -s sdk/python/tests

      - name: Verify schema coverage
        run: node dist/cli.js schema coverage --json

      - name: Verify Jumpspace graph
        run: |
          node dist/cli.js scan
          node dist/cli.js audit --json
          node dist/cli.js doctor --json

      - name: Verify package dry-run
        run: npm pack --dry-run --json

      - name: Verify release diagnostics
        run: |
          node dist/cli.js release doctor --json
          node dist/cli.js release install-doctor --json

      - name: Install docs dependencies
        run: npm --prefix docs ci

      - name: Test docs
        run: npm --prefix docs test

      - name: Build docs
        run: npm --prefix docs run build
